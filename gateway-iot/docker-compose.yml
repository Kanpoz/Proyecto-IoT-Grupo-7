services:

  mosquitto:
    image: eclipse-mosquitto:latest       # amd64 y arm64
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
    environment:
      - TZ=America/Bogota

  # Servicio que lee MQTT y escribe en SQLite
  # (puedes usar Python, Node-RED, etc.)
  data-logger:
    build: ./logger
    container_name: data-logger
    volumes:
      - ./data:/data                      # ← aquí queda el .db
      - ./logger:/app
    working_dir: /app
    command: python main.py
    depends_on:
      - mosquitto
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - DB_PATH=/data/sensores.db

volumes:
  mosquitto_data:
